<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPB Operations Workspace</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --ink: #14261d;
      --muted: #5a6a61;
      --accent: #215347;
      --accent-2: #c46c32;
      --accent-3: #195d85;
      --line: rgba(20, 38, 29, 0.1);
      --surface: rgba(246, 242, 233, 0.92);
      --bg: #d7e0db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; overflow: hidden;
      font-family: "Segoe UI", -apple-system, sans-serif;
      color: var(--ink); background: var(--bg);
    }
    .app {
      display: flex; height: 100vh;
    }

    /* Map */
    .map-panel {
      flex: 2; min-width: 0; position: relative;
    }
    #map {
      width: 100%; height: 100%;
    }
    .map-watermark {
      position: absolute; bottom: 20px; left: 20px;
      background: rgba(246,242,233,0.85); backdrop-filter: blur(6px);
      padding: 8px 14px; border-radius: 12px; font-size: 0.8rem; z-index: 1000;
      border: 1px solid var(--line); pointer-events: none;
    }

    /* Sidebar */
    .sidebar {
      flex: 0 0 380px; overflow-y: auto; padding: 18px 16px;
      background: var(--surface); backdrop-filter: blur(10px);
      border-left: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 14px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

    .section {
      border-radius: 18px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.5); overflow: hidden;
    }
    .section-header {
      padding: 14px 16px 0;
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
    }
    .section-body { padding: 12px 16px 16px; }

    /* Nav */
    .nav-row {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .nav-item {
      flex: 1; min-width: 70px; padding: 10px 8px; text-align: center;
      border-radius: 12px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.6); cursor: pointer;
      font-size: 0.82rem; transition: all 140ms; text-decoration: none; color: var(--ink);
    }
    .nav-item:hover { border-color: var(--accent); background: rgba(33,83,71,0.08); }
    .nav-item.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .nav-item .nav-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }

    /* Form */
    .form-row { display: flex; gap: 8px; margin-top: 8px; }
    .form-row input {
      flex: 1; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.8); font-size: 0.9rem; min-width: 0;
    }
    .btn {
      padding: 10px 16px; border: 0; border-radius: 12px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: wait; }

    /* Overlay checkboxes */
    .overlay-list { display: flex; flex-direction: column; gap: 0; }
    .overlay-scroll { max-height: 340px; overflow-y: auto; }

    .overlay-category { border-bottom: 1px solid var(--line); }
    .overlay-category:last-child { border-bottom: none; }

    .overlay-category-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 4px; cursor: pointer; font-size: 0.75rem;
      font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); user-select: none;
    }
    .overlay-category-header:hover { color: var(--ink); }
    .overlay-category-header .collapse-icon {
      transition: transform 180ms; font-size: 0.7rem; line-height: 1;
    }
    .overlay-category-header.collapsed .collapse-icon { transform: rotate(-90deg); }
    .overlay-category-body { display: flex; flex-direction: column; gap: 4px; padding: 0 0 4px; }
    .overlay-category-header.collapsed + .overlay-category-body { display: none; }

    .overlay-item {
      display: flex; align-items: center; gap: 10px; padding: 6px 8px;
      border-radius: 10px; cursor: pointer;
      transition: background 140ms; font-size: 0.82rem;
    }
    .overlay-item:hover { background: rgba(33,83,71,0.06); }
    .overlay-item input { accent-color: var(--accent); width: 14px; height: 14px; }
    .overlay-swatch {
      width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0;
    }

    /* Weather card */
    .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .weather-metric {
      padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.6);
      border: 1px solid var(--line); text-align: center;
    }
    .weather-metric .val { font-size: 1.3rem; font-weight: 700; color: var(--accent-3); }
    .weather-metric .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .weather-station { font-size: 0.82rem; color: var(--muted); margin-top: 8px; }

    /* Source status */
    .source-list { display: flex; flex-direction: column; gap: 6px; }
    .source-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; border-radius: 12px; border: 1px solid var(--line);
      font-size: 0.84rem;
    }
    .source-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px;
    }
    .source-dot.ready { background: #2a8; }
    .source-dot.error { background: #d44; }
    .source-dot.idle { background: #aaa; }

    /* Status bar */
    .status-bar {
      padding: 6px 0 0; font-size: 0.75rem; color: var(--muted); text-align: center;
    }

    @media (max-width: 800px) {
      .app { flex-direction: column; }
      .map-panel { flex: 1; min-height: 50vh; }
      .sidebar { flex: 0 0 auto; max-height: 50vh; border-left: none; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="map-panel">
      <div id="map"></div>
      <div class="map-watermark" id="map-watermark">Area: <strong id="map-area-label">North Karelia</strong></div>
    </div>

    <aside class="sidebar" id="sidebar">
      <!-- Navigation -->
      <div class="section">
        <div class="section-header">Navigation</div>
        <div class="section-body">
          <div class="nav-row">
            <a class="nav-item active" href="#"><span class="nav-icon">🗺️</span>Map</a>
            <a class="nav-item" href="#"><span class="nav-icon">🌤️</span>Weather</a>
            <a class="nav-item" href="#"><span class="nav-icon">📊</span>Analysis</a>
            <a class="nav-item" href="#"><span class="nav-icon">📋</span>Reports</a>
          </div>
        </div>
      </div>

      <!-- Area Controls -->
      <div class="section">
        <div class="section-header">Area</div>
        <div class="section-body">
          <form id="scenario-form">
            <input id="area-input" name="area" value="North Karelia" placeholder="Area" />
            <div class="form-row">
              <input id="timeframe-input" name="timeframe" value="72h" placeholder="Timeframe" />
              <button class="btn btn-primary" id="refresh-btn" type="submit">Refresh</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Overlay Settings -->
      <div class="section">
        <div class="section-header">Overlay Settings</div>
        <div class="section-body overlay-scroll">
          <div class="overlay-list" id="overlay-controls"></div>
        </div>
      </div>

      <!-- Weather -->
      <div class="section">
        <div class="section-header">Current Weather</div>
        <div class="section-body">
          <div class="weather-grid" id="weather-grid">
            <div class="weather-metric"><div class="val" id="w-temp">--</div><div class="lbl">Temp</div></div>
            <div class="weather-metric"><div class="val" id="w-wind">--</div><div class="lbl">Wind</div></div>
            <div class="weather-metric"><div class="val" id="w-humidity">--</div><div class="lbl">Humidity</div></div>
            <div class="weather-metric"><div class="val" id="w-pressure">--</div><div class="lbl">Pressure</div></div>
            <div class="weather-metric"><div class="val" id="w-vis">--</div><div class="lbl">Visibility</div></div>
            <div class="weather-metric"><div class="val" id="w-cloud">--</div><div class="lbl">Cloud</div></div>
          </div>
          <div class="weather-station" id="w-station">No weather data loaded</div>
        </div>
      </div>

      <!-- Source Status -->
      <div class="section">
        <div class="section-header">Data Sources</div>
        <div class="section-body">
          <div class="source-list" id="source-list"></div>
        </div>
      </div>

      <div class="status-bar" id="status-line">Loading...</div>
    </aside>
  </div>

  <script>
    const state = {
      area: "North Karelia", timeframe: "72h",
      map: null, collectionLayers: {}, layers: [],
      sources: [], weatherRecord: null,
      weatherMarker: null, pointMarker: null,
      weatherPickerActive: false, pointWeatherData: null,
    };

    const form = document.getElementById("scenario-form");
    const areaInput = document.getElementById("area-input");
    const timeframeInput = document.getElementById("timeframe-input");
    const refreshBtn = document.getElementById("refresh-btn");
    const overlayControls = document.getElementById("overlay-controls");
    const sourceListEl = document.getElementById("source-list");
    const statusLine = document.getElementById("status-line");

    function getCenter(area) {
      const a = area.toLowerCase();
      if (a.includes("north karelia")) return [62.8, 30.2];
      if (a.includes("lapland") || a.includes("kasivarren")) return [69.0, 21.5];
      if (a.includes("archipelago") || a.includes("saaristomeri")) return [60.2, 22.0];
      return [62.8, 30.2];
    }

    const COLL_STYLE = {
      tieviiva: { color: "#c46c32", weight: 2, fill: false },
      rakennus: { color: "#195d85", weight: 1.5, fillOpacity: 0.45 },
      jarvi: { color: "#215347", weight: 1, fillOpacity: 0.15 },
      meri: { color: "#215347", weight: 1, fillOpacity: 0.15 },
      virtavesialue: { color: "#215347", weight: 1.5, fill: false },
      korkeuskayra: { color: "#5a6a61", weight: 1, fill: false },
      suo: { color: "#5a6a61", weight: 1, fillOpacity: 0.15 },
      kallioalue: { color: "#5a6a61", weight: 1, fillOpacity: 0.1 },
      metsamaankasvillisuus: { color: "#2a8a5c", weight: 1, fillOpacity: 0.15 },
      maatalousmaa: { color: "#c4a832", weight: 1, fillOpacity: 0.15 },
      taajaanrakennettualue: { color: "#195d85", weight: 1.5, fillOpacity: 0.4 },
      rautatie: { color: "#c46c32", weight: 1.5, fill: false },
      sahkolinja: { color: "#c46c32", weight: 1, fill: false, dashArray: "6,4" },
      paikannimi: { point: true, color: "#c46c32" },
      kunta: { color: "#195d85", weight: 2, fillOpacity: 0.1 },
      kunnanhallintoraja: { color: "#195d85", weight: 1.5, dashArray: "4,4", fill: false },
      luonnonsuojelualue: { color: "#2a8a5c", weight: 1, fillOpacity: 0.08 },
      lentokenttaalue: { color: "#888", weight: 1, fillOpacity: 0.1 },
      satamaalue: { color: "#215347", weight: 1, fillOpacity: 0.1 },
      rautatieliikennepaikka: { point: true, color: "#c46c32" },
      osoitepiste: { point: true, color: "#888" },
    };

    function initMap() {
      state.map = L.map("map", { zoomControl: true }).setView(getCenter(state.area), 9);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a>', maxZoom: 18,
      }).addTo(state.map);

      state.map.on("click", async (e) => {
        if (!state.weatherPickerActive) return;
        const { lat, lng } = e.latlng;
        await fetchPointWeather(lat, lng);
      });

      NLS_COLLECTIONS.forEach((coll) => {
        const style = COLL_STYLE[coll.id] || { color: "#888", weight: 1 };
        const layer = L.geoJSON(null, {
          style: style.point ? undefined : style,
          pointToLayer: (f, ll) => {
            const c = style.color || "#888";
            return L.circleMarker(ll, { radius: 5, fillColor: c, color: "#fff", weight: 1, fillOpacity: 0.8 });
          },
          onEachFeature: (f, layer) => {
            const p = f.properties || {};
            const name = p.nimi || p.namn || "";
            layer.bindPopup(`<b>${coll.label}</b>${name ? `<br>${name}` : ""}`);
          },
        });
        state.collectionLayers[coll.id] = layer;
      });
    }

    async function loadMapData() {
      try {
        const resp = await fetch(`/api/map-data/nls?area=${encodeURIComponent(state.area)}`);
        const geojson = await resp.json();
        // Clear all collection layers
        Object.values(state.collectionLayers).forEach((l) => l.clearLayers());
        // Group features by _collection and add to respective layer
        const grouped = {};
        geojson.features.forEach((f) => {
          const coll = f.properties?._collection;
          if (coll) {
            if (!grouped[coll]) grouped[coll] = [];
            grouped[coll].push(f);
          }
        });
        let total = 0;
        Object.entries(grouped).forEach(([coll, features]) => {
          const layer = state.collectionLayers[coll];
          if (layer) {
            layer.addData({ type: "FeatureCollection", features });
            total += features.length;
            // Show on map if its overlay checkbox is checked
            const cb = document.querySelector(`input[data-collection="${coll}"]`);
            if (!cb || cb.checked) layer.addTo(state.map);
          }
        });
        statusLine.textContent = `Synced. ${total} features on map.`;
      } catch (e) { console.error("Map data load failed:", e); }
    }

    const NLS_COLLECTIONS = [
      { id: "tieviiva", label: "Road network", color: "#c46c32" },
      { id: "rakennus", label: "Buildings", color: "#195d85" },
      { id: "jarvi", label: "Lakes", color: "#215347" },
      { id: "meri", label: "Sea areas", color: "#215347" },
      { id: "virtavesialue", label: "Rivers and streams", color: "#215347" },
      { id: "korkeuskayra", label: "Elevation contours", color: "#5a6a61" },
      { id: "suo", label: "Bogs and marshes", color: "#5a6a61" },
      { id: "kallioalue", label: "Rocky areas", color: "#5a6a61" },
      { id: "metsamaankasvillisuus", label: "Forest vegetation", color: "#2a8a5c" },
      { id: "maatalousmaa", label: "Agricultural land", color: "#c4a832" },
      { id: "taajaanrakennettualue", label: "Densely built areas", color: "#195d85" },
      { id: "rautatie", label: "Railways", color: "#c46c32" },
      { id: "sahkolinja", label: "Power lines", color: "#c46c32" },
      { id: "paikannimi", label: "Place names", color: "#c46c32" },
      { id: "kunta", label: "Municipalities", color: "#195d85" },
      { id: "kunnanhallintoraja", label: "Municipal boundaries", color: "#195d85" },
      { id: "luonnonsuojelualue", label: "Protected areas", color: "#2a8a5c" },
      { id: "lentokenttaalue", label: "Airport areas", color: "#888" },
      { id: "satamaalue", label: "Harbor areas", color: "#215347" },
      { id: "rautatieliikennepaikka", label: "Railway stations", color: "#c46c32" },
      { id: "osoitepiste", label: "Address points", color: "#888" },
    ];

    const OVERLAY_CATEGORIES = [
      {
        name: "Topographical",
        ids: ["korkeuskayra", "jarvi", "meri", "virtavesialue", "suo", "kallioalue", "metsamaankasvillisuus", "maatalousmaa"],
      },
      {
        name: "Infrastructure",
        ids: ["tieviiva", "rakennus", "rautatie", "sahkolinja", "taajaanrakennettualue", "lentokenttaalue", "satamaalue", "rautatieliikennepaikka", "osoitepiste"],
      },
      {
        name: "Boundaries & Places",
        ids: ["kunta", "kunnanhallintoraja", "luonnonsuojelualue", "paikannimi"],
      },
      {
        name: "Weather",
        ids: [],
        weatherToggle: true,
      },
    ];

    const collMap = {};
    NLS_COLLECTIONS.forEach((c) => { collMap[c.id] = c; });

    function toggleCategory(header) {
      header.classList.toggle("collapsed");
    }

    function renderOverlays() {
      overlayControls.innerHTML = "";
      const allOpen = localStorage.getItem("overlay_cats") === "all";

      OVERLAY_CATEGORIES.forEach((cat, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "overlay-category";

        const header = document.createElement("div");
        header.className = "overlay-category-header";
        header.innerHTML = `<span>${cat.name}</span><span class="collapse-icon">▾</span>`;
        header.addEventListener("click", () => toggleCategory(header));
        wrap.appendChild(header);

        const body = document.createElement("div");
        body.className = "overlay-category-body";
        // First category open by default, rest collapsed
        if (idx !== 0) header.classList.add("collapsed");

        if (cat.weatherToggle) {
          const el = document.createElement("label");
          el.className = "overlay-item";
          el.innerHTML = `
            <input type="checkbox" checked data-collection="weather" />
            <span class="overlay-swatch" style="background:#c46c32"></span>
            <span>Current Weather (station)</span>
          `;
          el.querySelector("input").addEventListener("change", toggleOverlay);
          body.appendChild(el);

          const pickerEl = document.createElement("label");
          pickerEl.className = "overlay-item";
          pickerEl.style.marginTop = "4px";
          pickerEl.innerHTML = `
            <input type="checkbox" data-action="weather-picker" />
            <span class="overlay-swatch" style="background:#c46c32"></span>
            <span>Weather Picker <span style="font-weight:400;color:var(--muted)">(click map)</span></span>
          `;
          pickerEl.querySelector("input").addEventListener("change", (e) => {
            state.weatherPickerActive = e.target.checked;
            if (!state.weatherPickerActive && state.pointMarker) {
              state.map.removeLayer(state.pointMarker);
              state.pointMarker = null;
            }
            state.map.getContainer().style.cursor = state.weatherPickerActive ? "crosshair" : "";
          });
          body.appendChild(pickerEl);
        }

        cat.ids.forEach((id) => {
          const coll = collMap[id];
          if (!coll) return;
          const el = document.createElement("label");
          el.className = "overlay-item";
          el.innerHTML = `
            <input type="checkbox" checked data-collection="${coll.id}" />
            <span class="overlay-swatch" style="background:${coll.color}"></span>
            <span>${coll.label}</span>
          `;
          el.querySelector("input").addEventListener("change", toggleOverlay);
          body.appendChild(el);
        });

        wrap.appendChild(body);
        overlayControls.appendChild(wrap);
      });
    }

    function toggleOverlay(e) {
      const id = e.target.dataset.collection;
      if (id === "weather") {
        if (!state.weatherMarker) return;
        if (e.target.checked) {
          state.weatherMarker.addTo(state.map);
        } else {
          state.map.removeLayer(state.weatherMarker);
        }
        return;
      }
      const layer = state.collectionLayers?.[id];
      if (!layer) return;
      if (e.target.checked) {
        layer.addTo(state.map);
      } else {
        state.map.removeLayer(layer);
      }
    }

    function renderSources() {
      sourceListEl.innerHTML = "";
      if (!state.sources.length) {
        sourceListEl.innerHTML = '<div class="source-row" style="color:var(--muted)">No sources loaded</div>';
        return;
      }
      state.sources.forEach((s) => {
        const row = document.createElement("div");
        row.className = "source-row";
        row.innerHTML = `
          <span><span class="source-dot ${s.status}"></span>${s.name}</span>
          <span style="font-size:0.75rem;color:var(--muted)">${s.status}</span>
        `;
        sourceListEl.appendChild(row);
      });
    }

    async function fetchPointWeather(lat, lng) {
      statusLine.textContent = `Fetching weather for (${lat.toFixed(3)}, ${lng.toFixed(3)})...`;
      try {
        const resp = await fetch(`/api/weather/point?lat=${lat}&lon=${lng}&timeframe=24h`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        state.pointWeatherData = await resp.json();

        if (state.pointMarker) state.map.removeLayer(state.pointMarker);
        state.pointMarker = L.circleMarker([lat, lng], {
          radius: 12, fillColor: "#c46c32", color: "#fff", weight: 3, fillOpacity: 0.8,
        }).addTo(state.map).bindPopup("<b>Weather point</b><br>Click again to refresh").openPopup();

        renderWeather();
        statusLine.textContent = `Weather updated for (${lat.toFixed(3)}, ${lng.toFixed(3)})`;
      } catch (e) {
        console.error("Point weather fetch failed:", e);
        statusLine.textContent = "Weather fetch failed";
      }
    }

    function getObsValue(obs, key) { return obs?.[key]?.latest?.value; }

    function renderWeather() {
      const pw = state.pointWeatherData;
      const pwObs = pw?.observations?.observations || {};
      const pwFc = pw?.forecast?.observations || {};
      const pwStation = pw?.observations?.station || {};
      const pwQuery = pw?.query || {};

      const r = state.weatherRecord;
      const areaObs = r?.data?.observations || {};
      const areaStation = r?.data?.station || {};

      const hasObs = pw && Object.keys(pwObs).length > 0;
      const obs = hasObs ? pwObs : areaObs;
      const station = hasObs ? pwStation : areaStation;
      const fc = (pw && !hasObs) ? pwFc : (pw ? pwFc : {});

      const t = getObsValue(obs, "temperature") ?? getObsValue(fc, "temperature");
      const w = getObsValue(obs, "wind_speed") ?? getObsValue(fc, "wind_speed");
      const v = getObsValue(obs, "visibility") ?? getObsValue(fc, "visibility");
      const c = getObsValue(obs, "cloud_cover") ?? getObsValue(fc, "cloud_cover");
      const h = getObsValue(obs, "humidity") ?? getObsValue(fc, "humidity");
      const p = getObsValue(obs, "pressure") ?? (hasObs ? null : null);
      const pr = getObsValue(obs, "precipitation") ?? getObsValue(fc, "precipitation");

      document.getElementById("w-temp").textContent = t == null ? "--" : `${t}°`;
      document.getElementById("w-wind").textContent = w == null ? "--" : `${w} m/s`;
      document.getElementById("w-humidity").textContent = h == null ? "--" : `${h}%`;
      document.getElementById("w-pressure").textContent = p == null ? "--" : `${p} hPa`;
      document.getElementById("w-vis").textContent = v == null ? "--" : `${(v/1000).toFixed(1)} km`;
      const cloudVal = c == null ? "--" : (typeof c === "number" && c <= 8 ? `${c}/8` : `${c}%`);
      document.getElementById("w-cloud").textContent = cloudVal;

      let stationLabel = "";
      const fmtCoord = (v) => (v != null ? v.toFixed(3) : "--");
      if (pw && hasObs) {
        stationLabel = `Station: ${fmtCoord(pwQuery.lat)}, ${fmtCoord(pwQuery.lon)}`;
        if (station.name) stationLabel += ` ${station.name}`;
      } else if (pw && !hasObs) {
        stationLabel = `Forecast at ${fmtCoord(pwQuery.lat)}, ${fmtCoord(pwQuery.lon)}`;
      } else {
        stationLabel = station.name || "No weather data loaded";
      }
      document.getElementById("w-station").textContent = stationLabel;

      // Create or update weather station marker (only for non-point area data)
      if (state.weatherMarker) state.map.removeLayer(state.weatherMarker);
      state.weatherMarker = null;

      if (!pw && state.map && areaStation.latitude && areaStation.longitude) {
        state.weatherMarker = L.circleMarker([areaStation.latitude, areaStation.longitude], {
          radius: 10, fillColor: "#c46c32", color: "#fff", weight: 2, fillOpacity: 0.9,
        }).bindPopup(`
          <b>${areaStation.name}</b><br>Temp: ${t ?? "--"}°C<br>Wind: ${w ?? "--"} m/s<br>Vis: ${v ?? "--"} m
        `);
        const cb = document.querySelector('input[data-collection="weather"]');
        if (!cb || cb.checked) state.weatherMarker.addTo(state.map);
      }
    }

    async function ingest() {
      refreshBtn.disabled = true;
      refreshBtn.textContent = "Ingesting...";
      statusLine.textContent = `Ingesting data for ${state.area}...`;
      try {
        await fetch("/api/ingest", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ area: state.area, timeframe: state.timeframe }),
        });
      } catch (e) { console.error(e); }
      refreshBtn.disabled = false;
      refreshBtn.textContent = "Refresh";
    }

    async function loadWorkspace() {
      if (!state.map) initMap();
      document.getElementById("map-area-label").textContent = state.area;
      statusLine.textContent = `Auto-ingesting data for ${state.area}...`;
      state.pointWeatherData = null;
      state.weatherPickerActive = false;
      if (state.pointMarker) { state.map.removeLayer(state.pointMarker); state.pointMarker = null; }

      try {
        await fetch("/api/ingest", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ area: state.area, timeframe: state.timeframe }),
        });
      } catch (e) { console.error("Ingest failed:", e); }

      try {
        const [placeholderResp, datasetsResp, sourcesResp] = await Promise.all([
          fetch(`/api/ui-placeholder?area=${encodeURIComponent(state.area)}&timeframe=${encodeURIComponent(state.timeframe)}`),
          fetch("/api/datasets"),
          fetch("/api/sources"),
        ]);
        state.layers = (await placeholderResp.json()).map_layers || [];
        state.sources = await sourcesResp.json();
        const datasets = await datasetsResp.json();
        state.weatherRecord = [...datasets].reverse().find((r) => r.category === "weather") || null;

        renderOverlays();
        renderSources();
        renderWeather();
        loadMapData();
      } catch (e) {
        console.error(e);
        statusLine.textContent = "Could not load workspace data.";
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      state.area = areaInput.value.trim() || "North Karelia";
      state.timeframe = timeframeInput.value.trim() || "72h";
      document.getElementById("map-area-label").textContent = state.area;
      if (state.map) state.map.setView(getCenter(state.area), 9);
      await loadWorkspace();
    });

    loadWorkspace();
  </script>
</body>
</html>
