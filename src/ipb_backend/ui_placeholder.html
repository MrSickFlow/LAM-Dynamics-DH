<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPB Operations Workspace</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --ink: #14261d;
      --muted: #5a6a61;
      --accent: #215347;
      --accent-2: #c46c32;
      --accent-3: #195d85;
      --line: rgba(20, 38, 29, 0.1);
      --surface: rgba(246, 242, 233, 0.92);
      --bg: #d7e0db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; overflow: hidden;
      font-family: "Segoe UI", -apple-system, sans-serif;
      color: var(--ink); background: var(--bg);
    }
    .app {
      display: flex; height: 100vh;
    }

    /* Map */
    .map-panel {
      flex: 2; min-width: 0; position: relative;
    }
    #map {
      width: 100%; height: 100%;
    }
    .map-watermark {
      position: absolute; bottom: 20px; left: 20px;
      background: rgba(246,242,233,0.85); backdrop-filter: blur(6px);
      padding: 8px 14px; border-radius: 12px; font-size: 0.8rem; z-index: 1000;
      border: 1px solid var(--line); pointer-events: none;
    }

    /* Sidebar */
    .sidebar {
      flex: 0 0 380px; overflow-y: auto; padding: 18px 16px;
      background: var(--surface); backdrop-filter: blur(10px);
      border-left: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 14px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

    .section {
      border-radius: 18px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.5); overflow: hidden;
    }
    .section-header {
      padding: 14px 16px 0;
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
    }
    .section-body { padding: 12px 16px 16px; }

    /* Nav */
    .nav-row {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .nav-item {
      flex: 1; min-width: 70px; padding: 10px 8px; text-align: center;
      border-radius: 12px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.6); cursor: pointer;
      font-size: 0.82rem; transition: all 140ms; text-decoration: none; color: var(--ink);
    }
    .nav-item:hover { border-color: var(--accent); background: rgba(33,83,71,0.08); }
    .nav-item.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .nav-item .nav-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }

    /* Form */
    .form-row { display: flex; gap: 8px; margin-top: 8px; }
    .form-row input {
      flex: 1; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.8); font-size: 0.9rem; min-width: 0;
    }
    .btn {
      padding: 10px 16px; border: 0; border-radius: 12px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: wait; }

    /* Overlay checkboxes */
    .overlay-list { display: flex; flex-direction: column; gap: 6px; }
    .overlay-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      border-radius: 12px; border: 1px solid var(--line); cursor: pointer;
      transition: background 140ms; font-size: 0.88rem;
    }
    .overlay-item:hover { background: rgba(33,83,71,0.05); }
    .overlay-item input { accent-color: var(--accent); width: 16px; height: 16px; }
    .overlay-swatch {
      width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
    }

    /* Weather card */
    .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .weather-metric {
      padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.6);
      border: 1px solid var(--line); text-align: center;
    }
    .weather-metric .val { font-size: 1.3rem; font-weight: 700; color: var(--accent-3); }
    .weather-metric .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .weather-station { font-size: 0.82rem; color: var(--muted); margin-top: 8px; }

    /* Source status */
    .source-list { display: flex; flex-direction: column; gap: 6px; }
    .source-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; border-radius: 12px; border: 1px solid var(--line);
      font-size: 0.84rem;
    }
    .source-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px;
    }
    .source-dot.ready { background: #2a8; }
    .source-dot.error { background: #d44; }
    .source-dot.idle { background: #aaa; }

    /* Status bar */
    .status-bar {
      padding: 6px 0 0; font-size: 0.75rem; color: var(--muted); text-align: center;
    }

    @media (max-width: 800px) {
      .app { flex-direction: column; }
      .map-panel { flex: 1; min-height: 50vh; }
      .sidebar { flex: 0 0 auto; max-height: 50vh; border-left: none; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="map-panel">
      <div id="map"></div>
      <div class="map-watermark" id="map-watermark">Area: <strong id="map-area-label">North Karelia</strong></div>
    </div>

    <aside class="sidebar" id="sidebar">
      <!-- Navigation -->
      <div class="section">
        <div class="section-header">Navigation</div>
        <div class="section-body">
          <div class="nav-row">
            <a class="nav-item active" href="#"><span class="nav-icon">🗺️</span>Map</a>
            <a class="nav-item" href="#"><span class="nav-icon">🌤️</span>Weather</a>
            <a class="nav-item" href="#"><span class="nav-icon">📊</span>Analysis</a>
            <a class="nav-item" href="#"><span class="nav-icon">📋</span>Reports</a>
          </div>
        </div>
      </div>

      <!-- Scenario Controls -->
      <div class="section">
        <div class="section-header">Scenario</div>
        <div class="section-body">
          <form id="scenario-form">
            <input id="area-input" name="area" value="North Karelia" placeholder="Area" />
            <div class="form-row">
              <input id="timeframe-input" name="timeframe" value="72h" placeholder="Timeframe" />
              <button class="btn btn-primary" id="refresh-btn" type="submit">Refresh</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Overlay Settings -->
      <div class="section">
        <div class="section-header">Overlay Settings</div>
        <div class="section-body">
          <div class="overlay-list" id="overlay-controls"></div>
        </div>
      </div>

      <!-- Weather -->
      <div class="section">
        <div class="section-header">Current Weather</div>
        <div class="section-body">
          <div class="weather-grid" id="weather-grid">
            <div class="weather-metric"><div class="val" id="w-temp">--</div><div class="lbl">Temp</div></div>
            <div class="weather-metric"><div class="val" id="w-wind">--</div><div class="lbl">Wind</div></div>
            <div class="weather-metric"><div class="val" id="w-vis">--</div><div class="lbl">Visibility</div></div>
            <div class="weather-metric"><div class="val" id="w-cloud">--</div><div class="lbl">Cloud</div></div>
          </div>
          <div class="weather-station" id="w-station">No weather data loaded</div>
        </div>
      </div>

      <!-- Source Status -->
      <div class="section">
        <div class="section-header">Data Sources</div>
        <div class="section-body">
          <div class="source-list" id="source-list"></div>
        </div>
      </div>

      <div class="status-bar" id="status-line">Ready. Set area and click Refresh to ingest data.</div>
    </aside>
  </div>

  <script>
    const state = {
      area: "North Karelia", timeframe: "72h",
      map: null, mapDataLayer: null, layers: [],
      sources: [], weatherRecord: null,
    };

    const form = document.getElementById("scenario-form");
    const areaInput = document.getElementById("area-input");
    const timeframeInput = document.getElementById("timeframe-input");
    const refreshBtn = document.getElementById("refresh-btn");
    const overlayControls = document.getElementById("overlay-controls");
    const sourceListEl = document.getElementById("source-list");
    const statusLine = document.getElementById("status-line");

    function getCenter(area) {
      const a = area.toLowerCase();
      if (a.includes("north karelia")) return [62.8, 30.2];
      if (a.includes("lapland") || a.includes("kasivarren")) return [69.0, 21.5];
      if (a.includes("archipelago") || a.includes("saaristomeri")) return [60.2, 22.0];
      return [62.8, 30.2];
    }

    function initMap() {
      state.map = L.map("map", { zoomControl: true }).setView(getCenter(state.area), 9);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a>', maxZoom: 18,
      }).addTo(state.map);

      state.mapDataLayer = L.geoJSON(null, {
        style: (f) => ({
          color: f.properties._collection === "tieviiva" ? "#c46c32"
            : f.properties._collection === "rakennus" ? "#195d85"
            : f.properties._collection === "jarvi" || f.properties._collection === "meri" ? "#215347"
            : "#5a6a61",
          weight: f.geometry?.type === "LineString" ? 2 : 1,
          fillOpacity: 0.2,
        }),
        pointToLayer: (f, ll) => {
          const c = f.properties._collection === "paikannimi" ? "#c46c32" : "#195d85";
          return L.circleMarker(ll, { radius: 5, fillColor: c, color: "#fff", weight: 1, fillOpacity: 0.8 });
        },
        onEachFeature: (f, layer) => {
          const p = f.properties || {};
          const label = p._label || p._collection || "";
          const name = p.nimi || "";
          layer.bindPopup(`<b>${label}</b>${name ? `<br>${name}` : ""}`);
        },
      }).addTo(state.map);
    }

    async function loadMapData() {
      try {
        const resp = await fetch(`/api/map-data/nls?area=${encodeURIComponent(state.area)}`);
        const geojson = await resp.json();
        state.mapDataLayer.clearLayers();
        state.mapDataLayer.addData(geojson);
      } catch (e) { console.error("Map data load failed:", e); }
    }

    function renderOverlays() {
      overlayControls.innerHTML = "";
      state.layers.forEach((layer) => {
        const colors = { terrain: "#5a6a61", infrastructure: "#c46c32", demographics: "#195d85", weather: "#215347" };
        const el = document.createElement("label");
        el.className = "overlay-item";
        el.innerHTML = `
          <input type="checkbox" checked />
          <span class="overlay-swatch" style="background:${colors[layer.category] || '#888'}"></span>
          <span>${layer.title}</span>
        `;
        overlayControls.appendChild(el);
      });
    }

    function renderSources() {
      sourceListEl.innerHTML = "";
      if (!state.sources.length) {
        sourceListEl.innerHTML = '<div class="source-row" style="color:var(--muted)">No sources loaded</div>';
        return;
      }
      state.sources.forEach((s) => {
        const row = document.createElement("div");
        row.className = "source-row";
        row.innerHTML = `
          <span><span class="source-dot ${s.status}"></span>${s.name}</span>
          <span style="font-size:0.75rem;color:var(--muted)">${s.status}</span>
        `;
        sourceListEl.appendChild(row);
      });
    }

    function renderWeather() {
      const r = state.weatherRecord;
      const obs = r?.data?.observations || {};
      const station = r?.data?.station || {};
      const t = obs.temperature?.latest?.value;
      const w = obs.wind_speed?.latest?.value;
      const v = obs.visibility?.latest?.value;
      const c = obs.cloud_cover?.latest?.value;
      document.getElementById("w-temp").textContent = t == null ? "--" : `${t}°`;
      document.getElementById("w-wind").textContent = w == null ? "--" : `${w} m/s`;
      document.getElementById("w-vis").textContent = v == null ? "--" : `${(v/1000).toFixed(1)} km`;
      document.getElementById("w-cloud").textContent = c == null ? "--" : `${c}/8`;
      document.getElementById("w-station").textContent = station.name || "No weather data loaded";

      if (state.map && station.latitude && station.longitude) {
        L.circleMarker([station.latitude, station.longitude], {
          radius: 10, fillColor: "#c46c32", color: "#fff", weight: 2, fillOpacity: 0.9,
        }).addTo(state.map).bindPopup(`
          <b>${station.name}</b><br>Temp: ${t ?? "--"}°C<br>Wind: ${w ?? "--"} m/s<br>Vis: ${v ?? "--"} m
        `);
      }
    }

    async function ingest() {
      refreshBtn.disabled = true;
      refreshBtn.textContent = "Ingesting...";
      statusLine.textContent = `Ingesting data for ${state.area}...`;
      try {
        await fetch("/api/ingest", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ area: state.area, timeframe: state.timeframe }),
        });
      } catch (e) { console.error(e); }
      refreshBtn.disabled = false;
      refreshBtn.textContent = "Refresh";
    }

    async function loadWorkspace() {
      if (!state.map) initMap();
      document.getElementById("map-area-label").textContent = state.area;

      try {
        const [placeholderResp, datasetsResp, sourcesResp] = await Promise.all([
          fetch(`/api/ui-placeholder?area=${encodeURIComponent(state.area)}&timeframe=${encodeURIComponent(state.timeframe)}`),
          fetch("/api/datasets"),
          fetch("/api/sources"),
        ]);
        state.layers = (await placeholderResp.json()).map_layers || [];
        state.sources = await sourcesResp.json();
        const datasets = await datasetsResp.json();
        state.weatherRecord = [...datasets].reverse().find((r) => r.category === "weather") || null;

        renderOverlays();
        renderSources();
        renderWeather();
        loadMapData();
        statusLine.textContent = `Synced. ${(await (await fetch(`/api/map-data/nls?area=${encodeURIComponent(state.area)}`)).json()).features.length} features on map.`;
      } catch (e) {
        console.error(e);
        statusLine.textContent = "Could not load workspace data.";
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      state.area = areaInput.value.trim() || "North Karelia";
      state.timeframe = timeframeInput.value.trim() || "72h";
      document.getElementById("map-area-label").textContent = state.area;
      if (state.map) state.map.setView(getCenter(state.area), 9);
      await ingest();
      await loadWorkspace();
    });

    loadWorkspace();
  </script>
</body>
</html>
